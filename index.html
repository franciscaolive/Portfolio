<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisca Miranda</title>
    <link rel="stylesheet" href="src/styles/styles.css">
    <link rel="icon" href="src/assets/icons/favicon.png" type="image/png">
</head>
<body>
    <header class="topbar">
        <div class="top-left" id="role-label"></div>
        <button class="section-toggle" id="toggle-contacts" type="button" aria-controls="contacts-panel" aria-expanded="false"></button>

        <div class="top-right">
            <div class="theme" role="group" aria-label="Theme toggle">
                <button id="btn-light" data-theme="light" type="button">LIGHT</button>
                <span>/</span>
                <button id="btn-dark" data-theme="dark" type="button">DARK</button>
            </div>
            <div class="lang-toggle" role="group" aria-label="Language toggle">
                <button id="btn-pt" data-lang="pt" type="button">PT</button>
                <span>/</span>
                <button id="btn-en" data-lang="en" type="button">EN</button>
            </div>
        </div>
    </header>

    <main class="landing">
        <h1 class="name" id="name"></h1>
        <nav class="contacts-panel" id="contacts-panel" aria-label="Contacts" aria-hidden="true" inert>
            <a id="contact-cv" target="_blank" rel="noopener noreferrer"></a>
            <a id="contact-email"></a>
            <a id="contact-github" target="_blank" rel="noopener noreferrer"></a>
            <a id="contact-linkedin" target="_blank" rel="noopener noreferrer"></a>
        </nav>
        <p class="intro" id="intro"></p>

        <div class="cta">
            <a href="src/html/projects-landing-page.html" class="view-link" id="view-projects"></a>
        </div>

        <footer class="site-footer">
            <span id="copyright"></span>
        </footer>
    </main>

    <script src="src/scripts/main.js" defer></script>
</body>
</html>
