<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM | FM</title>
    <meta name="description" content="FM project by Francisca Miranda.">
    <meta property="og:title" content="FM | FM">
    <meta property="og:description" content="FM project by Francisca Miranda.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="../assets/icons/FM_FAVICON.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/FM_FAVICON.png">
    <link rel="apple-touch-icon" href="../assets/icons/FM_FAVICON.png">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="light-mode" data-base-path="..">
    <div class="wrapper">
        <header class="header" data-site-header></header>

        <main class="content project-detail" data-project-page data-project-id="fm">
            <a class="back-link" href="../index.html" aria-label="Back to portfolio" data-i18n="back">← Back to portfolio</a>

            <section class="project-hero project-hero--brand">
                <div class="project-hero__text">
                    <h1 class="project-title" data-project-title></h1>
                    <div class="project-tags" data-project-tags></div>
                </div>

                <figure class="project-hero__media project-hero__media--wide project-hero__media--screen" data-project-carousel>
                    <div class="project-carousel">
                        <div class="carousel-frame carousel-frame--landscape" data-frame>
                            <div class="carousel-slide is-active" data-slide>
                                <img src="../assets/images/FM/1.png" data-project-image-index="0" alt="">
                            </div>
                            <div class="carousel-slide" data-slide>
                                <img src="../assets/images/FM/2.png" data-project-image-index="1" alt="">
                            </div>
                            <div class="carousel-slide" data-slide>
                                <img src="../assets/images/FM/7.png" data-project-image-index="2" alt="">
                            </div>
                            <div class="carousel-slide" data-slide>
                                <img src="../assets/images/FM/8.png" data-project-image-index="3" alt="">
                            </div>
                            <div class="carousel-slide" data-slide>
                                <img src="../assets/images/FM/last.png" data-project-image-index="4" alt="">
                            </div>
                        </div>
                        <div class="carousel-controls">
                            <button class="carousel-control" data-direction="prev" aria-label="Previous image">&larr;</button>
                            <span class="carousel-indicator" aria-live="polite"><span data-current>1</span>/<span data-total>5</span></span>
                            <button class="carousel-control" data-direction="next" aria-label="Next image">&rarr;</button>
                        </div>
                    </div>
                    <figcaption class="visually-hidden" data-project-caption-index="0"></figcaption>
                </figure>

                <div class="project-hero__copy">
                    <div class="project-copy" data-project-body></div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
