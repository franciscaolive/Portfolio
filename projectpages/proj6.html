<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Francisca Miranda</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/favicon.jpg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/projects.css" />
    <link rel="stylesheet" href="../styles/language-switcher.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <a href="../index.html" class="header-name">Francisca Miranda</a>
        <nav class="navbar">
          <ul class="navbar-links">
            <li>
              <a href="../index.html#about" data-i18n="about">Sobre mim</a>
            </li>
            <li>
              <a href="../index.html#projects" data-i18n="projects">Projetos</a>
            </li>
          </ul>
        </nav>
        <div class="navbar-right">
          <button
            id="theme-toggle"
            class="theme-toggle"
            onclick="toggleTheme()"
            aria-label="toggle theme"
          >
            <i class="fas fa-moon"></i>
          </button>
          <div class="language-switcher">
            <button class="lang-btn" data-lang="pt" onclick="setLanguage('pt')">
              português
            </button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">
              english
            </button>
          </div>
          <div class="social-links">
            <a
              href="https://www.linkedin.com/in/francisca-miranda-18702b347/"
              target="_blank"
              class="social-icon"
            >
              <i class="fab fa-linkedin"></i>
            </a>
            <a
              href="https://github.com/franciscaolive"
              target="_blank"
              class="social-icon"
            >
              <i class="fab fa-github"></i>
            </a>
          </div>
        </div>
      </div>
    </header>

    <section class="project-detail">
      <div class="project-header">
        <h1 data-project="title">Ciclo Obscuro</h1>
        <p class="project-subtitle" data-project="subtitle">
          A última aventura de duas amigas...
        </p>
      </div>

      <div class="project-videos">
        <video width="640" height="360" controls>
          <source
            src="https://www.dropbox.com/scl/fi/cuk2mn2a0hd71ymhf8bau/cicloobscuro.mp4?rlkey=ihrle6byiurjnbe301e4pfrrf&st=di1b6iek&raw=1"
            type="video/mp4"
          />
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="project-description" data-project="description"></div>

      <a href="../index.html#projects" class="cta-button" data-i18n="back"
        >Voltar</a
      >
    </section>

    <footer>
      <p data-i18n="footer">
        © 2025 | Francisca Miranda | franciscaolivmir@gmail.com
      </p>
    </footer>

    <script src="../js/theme-toggle.js"></script>
    <script src="../js/translations.js"></script>
    <script src="../js/project-translations.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        updateProjectPage("proj6");
      });
    </script>
    <script src="../js/custom-cursor.js"></script>
  </body>
</html>
